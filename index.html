<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Soup - Letter Matching Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #FFB6C1 0%, #FFC0CB 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #FF69B4;
            margin-bottom: 10px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
        }

        .subtitle {
            text-align: center;
            color: #FFB6C1;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid #FF69B4;
        }

        .score-item {
            text-align: center;
        }

        .score-label {
            color: #FF69B4;
            font-size: 1em;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .score-value {
            font-size: 2.2em;
            font-weight: bold;
            color: #FF1493;
        }

        .game-area {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        .left-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            background: linear-gradient(135deg, #FFFACD 0%, #FFEAA7 100%);
            border-radius: 30px;
            border: 5px solid #FFD700;
            padding: 20px;
        }

        .target-letter {
            font-size: 8em;
            font-weight: bold;
            color: #FF69B4;
            text-shadow: 3px 3px 6px rgba(255, 105, 180, 0.3);
            line-height: 1;
        }

        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .soup-container {
            width: 100%;
            height: 350px;
            background: radial-gradient(ellipse at center, #FFE4B5 0%, #FFDAB9 50%, #FFCC99 100%);
            border-radius: 20px;
            border: 6px solid #D2691E;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .soup-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle 2px at 20% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 50%),
                radial-gradient(circle 3px at 60% 70%, rgba(255, 255, 255, 0.2) 0%, transparent 50%),
                radial-gradient(circle 2px at 40% 50%, rgba(255, 255, 255, 0.25) 0%, transparent 50%);
            pointer-events: none;
        }

        .letter-btn {
            width: 50px;
            height: 50px;
            font-size: 2em;
            font-weight: bold;
            border: 3px solid #8B4513;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            cursor: pointer;
            transition: all 0.2s;
            color: #8B4513;
            font-family: 'Comic Sans MS', cursive;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .letter-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .letter-btn.selected {
            background: linear-gradient(135deg, #87CEEB 0%, #4A90E2 100%);
            color: white;
            border-color: #4A90E2;
        }

        .letter-btn.correct {
            background: linear-gradient(135deg, #90EE90 0%, #32CD32 100%);
            color: white;
            border-color: #228B22;
            animation: bounce 0.6s;
        }

        .letter-btn.wrong {
            background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
            color: white;
            border-color: #FF1493;
            animation: shake 0.3s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.2) translateY(-15px); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .message {
            text-align: center;
            font-weight: bold;
            margin-top: 15px;
            font-size: 1.4em;
            height: 35px;
        }

        .message.success {
            color: #32CD32;
            text-shadow: 1px 1px 2px rgba(50, 205, 50, 0.3);
        }

        .message.error {
            color: #FF69B4;
            text-shadow: 1px 1px 2px rgba(255, 105, 180, 0.3);
        }

        .buttons-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button.action-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-family: 'Comic Sans MS', cursive;
        }

        button.next-btn {
            background: linear-gradient(135deg, #87CEEB 0%, #4A90E2 100%);
            color: white;
            flex: 1;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 3px solid #1E90FF;
        }

        button.next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        button.next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        button.reset-btn {
            background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
            color: white;
            padding: 15px 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border: 3px solid #FF1493;
        }

        button.reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .instructions {
            background: linear-gradient(135deg, #E0FFFF 0%, #AFEEEE 100%);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            color: #008B8B;
            font-size: 1em;
            line-height: 1.6;
            border: 3px solid #20B2AA;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .game-area {
                flex-direction: column;
                gap: 20px;
            }

            h1 {
                font-size: 2.2em;
            }

            .target-letter {
                font-size: 5em;
            }

            .left-side, .soup-container {
                min-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍲 Alphabet Soup</h1>
        <p class="subtitle">Find the matching letter!</p>

        <div class="instructions">
            🎈 Look at the BIG letter on the left, then click the SAME letter floating in the soup! 🎈
        </div>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">✅ Correct</div>
                <div class="score-value" id="correct">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">❌ Wrong</div>
                <div class="score-value" id="wrong">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">🎮 Round</div>
                <div class="score-value" id="round">1/10</div>
            </div>
        </div>

        <div class="game-area">
            <div class="left-side">
                <div class="target-letter" id="targetLetter">A</div>
            </div>

            <div class="right-side">
                <div class="soup-container" id="letterButtons"></div>
                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="buttons-row">
            <button class="action-btn next-btn" id="nextBtn" disabled>⏭️ Next</button>
            <button class="action-btn reset-btn" id="resetBtn">🔄 Play Again</button>
        </div>
    </div>

    <script>
        const TOTAL_ROUNDS = 10;
        let state = {
            correctCount: 0,
            wrongCount: 0,
            currentRound: 1,
            targetLetter: '',
            selectedLetter: null,
            answered: false,
            gameOver: false
        };

        const elements = {
            targetLetter: document.getElementById('targetLetter'),
            letterButtons: document.getElementById('letterButtons'),
            correct: document.getElementById('correct'),
            wrong: document.getElementById('wrong'),
            round: document.getElementById('round'),
            message: document.getElementById('message'),
            nextBtn: document.getElementById('nextBtn'),
            resetBtn: document.getElementById('resetBtn')
        };

        function getRandomLetter() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            return letters[Math.floor(Math.random() * letters.length)];
        }

        function getShuffledLetters(target) {
            const letters = new Set([target]);
            while (letters.size < 9) {
                letters.add(getRandomLetter());
            }
            return Array.from(letters).sort(() => Math.random() - 0.5);
        }

        function initializeGame() {
            state.targetLetter = getRandomLetter();
            elements.targetLetter.textContent = state.targetLetter;
            
            const shuffled = getShuffledLetters(state.targetLetter);
            
            elements.letterButtons.innerHTML = shuffled.map(letter => 
                `<button class="letter-btn" data-letter="${letter}">${letter}</button>`
            ).join('');

            state.selectedLetter = null;
            state.answered = false;
            elements.message.textContent = '';
            elements.message.className = 'message';
            elements.nextBtn.disabled = true;

            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.addEventListener('click', handleLetterClick);
            });
        }

        function handleLetterClick(e) {
            if (state.answered) return;

            const letter = e.target.dataset.letter;
            state.selectedLetter = letter;

            // Remove previous selection
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('selected', 'correct', 'wrong');
            });

            if (letter === state.targetLetter) {
                e.target.classList.add('correct');
                state.correctCount++;
                elements.correct.textContent = state.correctCount;
                elements.message.textContent = '🎉 Correct! Great job!';
                elements.message.className = 'message success';
            } else {
                e.target.classList.add('wrong');
                state.wrongCount++;
                elements.wrong.textContent = state.wrongCount;
                elements.message.textContent = '🤔 Oops! Try again!';
                elements.message.className = 'message error';
            }

            state.answered = true;
            elements.nextBtn.disabled = false;
        }

        function nextRound() {
            if (state.currentRound < TOTAL_ROUNDS) {
                state.currentRound++;
                elements.round.textContent = `${state.currentRound}/${TOTAL_ROUNDS}`;
                initializeGame();
            } else {
                endGame();
            }
        }

        function endGame() {
            state.gameOver = true;
            const accuracy = Math.round((state.correctCount / TOTAL_ROUNDS) * 100);
            elements.message.textContent = `🏆 Game Over! You got ${state.correctCount} correct!`;
            elements.message.className = 'message success';
            elements.nextBtn.disabled = true;
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        function resetGame() {
            state = {
                correctCount: 0,
                wrongCount: 0,
                currentRound: 1,
                targetLetter: '',
                selectedLetter: null,
                answered: false,
                gameOver: false
            };
            elements.correct.textContent = '0';
            elements.wrong.textContent = '0';
            elements.round.textContent = '1/10';
            initializeGame();
        }

        elements.nextBtn.addEventListener('click', nextRound);
        elements.resetBtn.addEventListener('click', resetGame);

        // Start the game
        initializeGame();
    </script>
</body>
</html>
