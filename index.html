<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphabet Soup - Letter Matching Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #FFB6E1 0%, #FFD4E5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #FF1493;
            margin-bottom: 10px;
            font-size: 3.5em;
            text-shadow: 3px 3px 6px rgba(255, 105, 180, 0.25);
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: #FF69B4;
            margin-bottom: 30px;
            font-size: 1.4em;
            font-weight: bold;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FFF0F5 0%, #FFE4E1 100%);
            padding: 25px;
            border-radius: 30px;
            border: 5px solid #FF69B4;
            gap: 20px;
        }

        .score-item {
            text-align: center;
            flex: 1;
        }

        .score-label {
            color: #FF1493;
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .score-value {
            font-size: 2.8em;
            font-weight: bold;
            color: #FF1493;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
        }

        .game-area {
            display: flex;
            gap: 50px;
            margin-bottom: 40px;
            align-items: center;
        }

        .left-side {
            flex: 0 0 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            background: linear-gradient(135deg, #FFFACD 0%, #FFFFE0 100%);
            border-radius: 40px;
            border: 8px solid #FFD700;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .target-letter {
            font-size: 10em;
            font-weight: bold;
            color: #FF1493;
            text-shadow: 5px 5px 10px rgba(255, 105, 180, 0.35);
            line-height: 1;
        }

        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .soup-container {
            width: 100%;
            height: 400px;
            background: radial-gradient(ellipse at 30% 30%, #FFE8B6 0%, #FFD699 30%, #FFC87F 60%, #FFBE66 100%);
            border-radius: 30px;
            border: 8px solid #8B4513;
            padding: 30px;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            gap: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 8px 15px rgba(0, 0, 0, 0.25), 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        /* Soup texture and bubbles */
        .soup-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle 8px at 15% 20%, rgba(255, 255, 255, 0.4) 0%, transparent 60%),
                radial-gradient(circle 6px at 75% 15%, rgba(255, 255, 255, 0.35) 0%, transparent 60%),
                radial-gradient(circle 5px at 50% 80%, rgba(255, 255, 255, 0.3) 0%, transparent 60%),
                radial-gradient(circle 7px at 25% 70%, rgba(255, 255, 255, 0.38) 0%, transparent 60%),
                radial-gradient(circle 4px at 85% 50%, rgba(255, 255, 255, 0.32) 0%, transparent 60%);
            pointer-events: none;
            animation: bubbleFloat 6s ease-in-out infinite;
        }

        @keyframes bubbleFloat {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-10px) translateX(5px); opacity: 0.5; }
        }

        .letter-btn {
            width: 70px;
            height: 70px;
            font-size: 2.8em;
            font-weight: bold;
            border: 4px solid #CD853F;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #FFE699 0%, #FFD966 50%, #FFC944 100%);
            cursor: pointer;
            transition: all 0.25s;
            color: #8B4513;
            font-family: 'Comic Sans MS', cursive;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.25), inset -2px -2px 4px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-basis: 70px;
        }

        .letter-btn:active {
            transform: scale(0.95) translateY(2px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }

        .letter-btn:hover {
            transform: scale(1.2) translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        .letter-btn.selected {
            background: radial-gradient(circle at 30% 30%, #87CEEB 0%, #4A90E2 50%, #2E5C8A 100%);
            color: white;
            border-color: #1E90FF;
        }

        .letter-btn.correct {
            background: radial-gradient(circle at 30% 30%, #98FB98 0%, #32CD32 50%, #228B22 100%);
            color: white;
            border-color: #006400;
            animation: superBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .letter-btn.wrong {
            background: radial-gradient(circle at 30% 30%, #FFB6C1 0%, #FF69B4 50%, #FF1493 100%);
            color: white;
            border-color: #C71585;
            animation: bigShake 0.4s;
        }

        @keyframes superBounce {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.3) translateY(-25px); }
            100% { transform: scale(1) translateY(0); }
        }

        @keyframes bigShake {
            0%, 100% { transform: translateX(0) rotateZ(0deg); }
            25% { transform: translateX(-15px) rotateZ(-5deg); }
            75% { transform: translateX(15px) rotateZ(5deg); }
        }

        .message {
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            font-size: 1.8em;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.success {
            color: #32CD32;
            text-shadow: 2px 2px 4px rgba(50, 205, 50, 0.3);
            animation: popIn 0.4s;
        }

        .message.error {
            color: #FF1493;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
            animation: popIn 0.4s;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .buttons-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button.action-btn {
            padding: 20px 50px;
            font-size: 1.4em;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.25s;
            font-family: 'Comic Sans MS', cursive;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        button.next-btn {
            background: linear-gradient(135deg, #87CEEB 0%, #4A90E2 100%);
            color: white;
            flex: 1;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            border: 4px solid #1E90FF;
        }

        button.next-btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button.next-btn:active:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
        }

        button.next-btn:disabled {
            background: #ddd;
            cursor: not-allowed;
            transform: none;
            opacity: 0.6;
        }

        button.reset-btn {
            background: linear-gradient(135deg, #FFB6C1 0%, #FF69B4 100%);
            color: white;
            padding: 20px 40px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            border: 4px solid #FF1493;
        }

        button.reset-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        button.reset-btn:active {
            transform: translateY(-2px) scale(1.02);
        }

        .instructions {
            background: linear-gradient(135deg, #E0FFFF 0%, #AFEEEE 100%);
            padding: 20px;
            border-radius: 25px;
            margin-bottom: 25px;
            color: #008B8B;
            font-size: 1.2em;
            line-height: 1.7;
            border: 5px solid #20B2AA;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        @media (max-width: 768px) {
            .game-area {
                flex-direction: column;
                gap: 30px;
            }

            h1 {
                font-size: 2.8em;
            }

            .target-letter {
                font-size: 7em;
            }

            .left-side {
                flex: 1;
                width: 100%;
                min-height: 300px;
            }

            .soup-container {
                height: 300px;
            }

            .letter-btn {
                width: 60px;
                height: 60px;
                font-size: 2.2em;
            }

            button.action-btn {
                padding: 15px 30px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍲 ALPHABET SOUP 🍲</h1>
        <p class="subtitle">Match the letters! 🎈</p>

        <div class="instructions">
            👀 Look at the BIG letter! 👉 Find it in the SOUP and TAP IT! ✨
        </div>

        <div class="score-board">
            <div class="score-item">
                <div class="score-label">⭐ CORRECT</div>
                <div class="score-value" id="correct">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">💫 WRONG</div>
                <div class="score-value" id="wrong">0</div>
            </div>
            <div class="score-item">
                <div class="score-label">🎮 ROUND</div>
                <div class="score-value" id="round">1/10</div>
            </div>
        </div>

        <div class="game-area">
            <div class="left-side">
                <div class="target-letter" id="targetLetter">A</div>
            </div>

            <div class="right-side">
                <div class="soup-container" id="letterButtons"></div>
                <div class="message" id="message"></div>
            </div>
        </div>

        <div class="buttons-row">
            <button class="action-btn next-btn" id="nextBtn" disabled>⏭️ NEXT</button>
            <button class="action-btn reset-btn" id="resetBtn">🔄 PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const TOTAL_ROUNDS = 10;
        let state = {
            correctCount: 0,
            wrongCount: 0,
            currentRound: 1,
            targetLetter: '',
            selectedLetter: null,
            answered: false,
            gameOver: false
        };

        const elements = {
            targetLetter: document.getElementById('targetLetter'),
            letterButtons: document.getElementById('letterButtons'),
            correct: document.getElementById('correct'),
            wrong: document.getElementById('wrong'),
            round: document.getElementById('round'),
            message: document.getElementById('message'),
            nextBtn: document.getElementById('nextBtn'),
            resetBtn: document.getElementById('resetBtn')
        };

        function getRandomLetter() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            return letters[Math.floor(Math.random() * letters.length)];
        }

        function getShuffledLetters(target) {
            const letters = new Set([target]);
            while (letters.size < 9) {
                letters.add(getRandomLetter());
            }
            return Array.from(letters).sort(() => Math.random() - 0.5);
        }

        function initializeGame() {
            state.targetLetter = getRandomLetter();
            elements.targetLetter.textContent = state.targetLetter;
            
            const shuffled = getShuffledLetters(state.targetLetter);
            
            elements.letterButtons.innerHTML = shuffled.map(letter => 
                `<button class="letter-btn" data-letter="${letter}">${letter}</button>`
            ).join('');

            state.selectedLetter = null;
            state.answered = false;
            elements.message.textContent = '';
            elements.message.className = 'message';
            elements.nextBtn.disabled = true;

            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.addEventListener('click', handleLetterClick);
            });
        }

        function handleLetterClick(e) {
            if (state.answered) return;

            const letter = e.target.dataset.letter;
            state.selectedLetter = letter;

            // Remove previous selection
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.classList.remove('selected', 'correct', 'wrong');
            });

            if (letter === state.targetLetter) {
                e.target.classList.add('correct');
                state.correctCount++;
                elements.correct.textContent = state.correctCount;
                elements.message.textContent = '🎉 YESSS! GREAT JOB! 🌟';
                elements.message.className = 'message success';
            } else {
                e.target.classList.add('wrong');
                state.wrongCount++;
                elements.wrong.textContent = state.wrongCount;
                elements.message.textContent = '😊 TRY AGAIN! YOU GOT THIS! 💪';
                elements.message.className = 'message error';
            }

            state.answered = true;
            elements.nextBtn.disabled = false;
        }

        function nextRound() {
            if (state.currentRound < TOTAL_ROUNDS) {
                state.currentRound++;
                elements.round.textContent = `${state.currentRound}/${TOTAL_ROUNDS}`;
                initializeGame();
            } else {
                endGame();
            }
        }

        function endGame() {
            state.gameOver = true;
            elements.message.textContent = `🏆 AMAZING! YOU GOT ${state.correctCount}/10! YOU'RE A STAR! 🌟🌟🌟`;
            elements.message.className = 'message success';
            elements.nextBtn.disabled = true;
            document.querySelectorAll('.letter-btn').forEach(btn => {
                btn.disabled = true;
            });
        }

        function resetGame() {
            state = {
                correctCount: 0,
                wrongCount: 0,
                currentRound: 1,
                targetLetter: '',
                selectedLetter: null,
                answered: false,
                gameOver: false
            };
            elements.correct.textContent = '0';
            elements.wrong.textContent = '0';
            elements.round.textContent = '1/10';
            initializeGame();
        }

        elements.nextBtn.addEventListener('click', nextRound);
        elements.resetBtn.addEventListener('click', resetGame);

        // Start the game
        initializeGame();
    </script>
</body>
</html>
